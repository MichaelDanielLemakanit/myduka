{% extends "base.html" %}
{% block title %} Products {% endblock %}

{% block content %}
<div>
    <p>
        this is product page
    </p>
    <!-- form table -->
    <div>
        <form action="/add_products" method="post">
            <div class="mb-3">
                <label for="exampleInputEmail1" class="form-label">Product Name</label>
                <input type="text" name="p_name" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
            </div>
            <div class="mb-3">
                <label for="exampleInputPassword1" class="form-label">Buying Price</label>
                <input type="number" name="b_price" class="form-control" id="exampleInputPassword1">
            </div>
            <div class="mb-3">
                <label for="exampleInputPassword1" class="form-label">Selling Price</label>
                <input type="number" name="s_price" class="form-control" id="exampleInputPassword1">
            </div>
        
            <button type="submit" class="btn btn-primary">Add Product</button>
        </form>
    </div>
    <div>
        <table id="example" class="table table-striped">
            <thead>
                <tr>
                    <th>product name</th>
                    <th>Product id</th>
                    <th>Buying price</th>
                    <th>Selling price</th>
                    <th>Quantity</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for i in products_data %}
                <tr>
                    <td>{{ i[1] }}</td>
                    <td>{{ i[0] }}</td>
                    <td>{{ i[2] }}</td>
                    <td>{{ i[3] }}</td>
                    <td>{{ i[4] }}</td>
                    <td>
                        <button class="btn btn-primary">Edit</button>
                        <button class="btn btn-danger">Delete</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
